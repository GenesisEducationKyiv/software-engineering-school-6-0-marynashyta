name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  IMAGE_NAME: release-notification-api

jobs:
  # ── Job 1: Static analysis ──────────────────────────────────────────────────
  lint:
    name: PHPStan (level 9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/php-setup

      - name: Run PHPStan
        run: php -d memory_limit=512M vendor/bin/phpstan analyse --no-progress

      - name: Run PHPCS
        run: vendor/bin/phpcs

  # ── Job 2: Validate compose & config files ─────────────────────────────────
  validate-configs:
    name: Validate Compose & Prometheus Config
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for compose interpolation
        run: cp .env.example .env

      - name: Validate main compose
        run: docker compose config --quiet

      - name: Validate ELK overlay
        run: docker compose -f docker-compose.yml -f docker-compose.elk.yml config --quiet

      - name: Validate test compose
        run: docker compose -f docker-compose.test.yml config --quiet

      - name: Validate Prometheus config
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/docker/prometheus.yml:/prometheus.yml:ro" \
            prom/prometheus:v2.54.1 \
            promtool check config /prometheus.yml

  # ── Job 3: Docker build + image scan ───────────────────────────────────────
  # Only runs when lint passes.
  build:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get week number for cache rotation
        id: date
        run: echo "week=$(date +%Y-%W)" >> $GITHUB_OUTPUT

      - name: Build image (with GHA layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=build-${{ steps.date.outputs.week }}
          cache-to: type=gha,mode=max,scope=build-${{ steps.date.outputs.week }}

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
