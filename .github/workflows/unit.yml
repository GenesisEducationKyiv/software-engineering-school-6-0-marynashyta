name: Unit Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/php-setup
        with:
          php-extensions: pdo_sqlite, zip

      - name: Run unit tests
        run: vendor/bin/phpunit --colors=always
